<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Situatiebeoordeling – Eemhart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --or:#E75113;--bl:#39B2C6;--bl2:#2d818e;--pu:#890F75;
  --bg:#F4F6F9;--wh:#fff;--ln:#E2E7EF;
  --mt:#8B95A5;--dk:#1A2135;--mid:#4A5568;
  --g:#16a34a;--y:#d97706;--r:#dc2626;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-font-smoothing:antialiased}
body{font-family:'Lexend',sans-serif;background:var(--bg);color:var(--dk);min-height:100vh;font-size:15px;line-height:1.6}

/* ── TOPBAR ── */
.tb{position:fixed;top:0;left:0;right:0;z-index:200;height:54px;background:var(--wh);border-bottom:1px solid var(--ln);display:flex;align-items:center;justify-content:space-between;padding:0 28px}
.logo{font-size:16px;font-weight:700;letter-spacing:-.3px;display:flex;align-items:center}
.lE{color:var(--bl2)}.lH{color:var(--or);font-size:17px}.lA{color:var(--or)}
.logo-div{width:1px;height:18px;background:var(--ln);margin:0 14px}
.logo-sub{font-size:11px;color:var(--mt);font-weight:500}
.tb-r{display:flex;align-items:center;gap:14px}
.tb-c{font-size:12px;color:var(--mt);font-weight:500}
.btn-rst{font-size:12px;font-weight:500;font-family:inherit;color:var(--mt);background:none;border:1.5px solid var(--ln);padding:5px 14px;border-radius:6px;cursor:pointer;transition:.15s}
.btn-rst:hover{color:var(--dk);border-color:var(--mt)}

/* ── PIPELINE ── */
.pipe{position:fixed;top:54px;left:0;right:0;z-index:199;background:var(--wh);border-bottom:1px solid var(--ln);padding:14px 28px 12px;overflow-x:auto;scrollbar-width:none}
.pipe::-webkit-scrollbar{display:none}
.pipe-in{display:flex;align-items:flex-start;min-width:max-content;margin:0 auto;max-width:720px;width:100%}
.pn{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0}
.pc{width:30px;height:30px;border-radius:50%;border:2px solid var(--ln);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--mt);background:var(--wh);transition:all .4s cubic-bezier(.4,0,.2,1)}
.pc.done{background:var(--bl);border-color:var(--bl);color:var(--wh)}
.pc.active{background:var(--or);border-color:var(--or);color:var(--wh);transform:scale(1.18);box-shadow:0 0 0 4px rgba(231,81,19,.15)}
.pc.skip{border-style:dashed;border-color:var(--ln);color:var(--ln)}
.pl{flex:1;min-width:18px;max-width:56px;height:2px;background:var(--ln);margin-top:15px;flex-shrink:0;transition:background .4s ease}
.pl.done{background:var(--bl)}
.pn-lbl{font-size:9px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--mt);white-space:nowrap;transition:.3s}
.pn.done .pn-lbl{color:var(--bl2)}.pn.active .pn-lbl{color:var(--or);font-weight:700}.pn.skip .pn-lbl{color:var(--ln)}
.pn-dots{display:flex;gap:3px;margin-top:2px}
.pd{width:5px;height:5px;border-radius:50%;background:var(--ln);transition:.3s}
.pd.done{background:var(--bl)}.pd.active{background:var(--or)}

/* ── STAGE ── */
.stage{min-height:100vh;padding-top:118px;display:flex;align-items:center;justify-content:center}
.inner{width:100%;max-width:600px;padding:52px 24px 80px}

/* ── CARD ── */
.card{animation:slideR .3s cubic-bezier(.4,0,.2,1)}
.card.back{animation:slideL .3s cubic-bezier(.4,0,.2,1)}
@keyframes slideR{from{opacity:0;transform:translateX(48px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideL{from{opacity:0;transform:translateX(-48px)}to{opacity:1;transform:translateX(0)}}

.step-idx{font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--mt);margin-bottom:20px}
.q-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.q-text{font-size:25px;font-weight:600;line-height:1.25;color:var(--dk);flex:1}
.q-hint{font-size:13.5px;color:var(--mid);margin-bottom:24px;line-height:1.6}

/* ── TOOLTIP ICONS ── */
.tip-icons{display:flex;gap:6px;flex-shrink:0;margin-top:4px}
.tip-ic{
  width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:10px;font-weight:700;
  transition:.15s;position:relative;flex-shrink:0;
  border:1.5px solid;
  -webkit-user-select:none;user-select:none;
}
.tip-ic.t{background:rgba(57,178,198,.1);border-color:rgba(57,178,198,.4);color:var(--bl2)}
.tip-ic.t:hover,.tip-ic.t.on{background:var(--bl);border-color:var(--bl);color:var(--wh)}
.tip-ic.d{background:rgba(137,15,117,.08);border-color:rgba(137,15,117,.3);color:var(--pu);font-size:9px}
.tip-ic.d:hover,.tip-ic.d.on{background:var(--pu);border-color:var(--pu);color:var(--wh)}

/* Per-option tooltip icons */
.opt-ic{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;cursor:pointer;font-size:9px;font-weight:700;transition:.15s;border:1.5px solid;flex-shrink:0;vertical-align:middle;margin-left:3px;-webkit-user-select:none;user-select:none}
.opt-ic.t{background:rgba(57,178,198,.1);border-color:rgba(57,178,198,.35);color:var(--bl2)}
.opt-ic.t:hover,.opt-ic.t.on{background:var(--bl);border-color:var(--bl);color:var(--wh)}
.opt-ic.d{background:rgba(137,15,117,.07);border-color:rgba(137,15,117,.25);color:var(--pu);font-size:8px}
.opt-ic.d:hover,.opt-ic.d.on{background:var(--pu);border-color:var(--pu);color:var(--wh)}
.opt-ic.xs{width:15px;height:15px;font-size:8px}

.tip-panel.sm{font-size:12.5px;padding:10px 14px;margin-top:5px;margin-bottom:8px}
.chip-tp{margin-top:8px}
.ch-tips{display:flex;gap:4px;margin-left:auto;align-items:center;flex-shrink:0;padding-left:8px}

/* ── TOOLTIP PANEL ── */
.tip-panel{
  background:var(--wh);border-radius:12px;
  padding:14px 18px;font-size:13px;line-height:1.65;
  box-shadow:0 8px 40px rgba(0,0,0,.13);
  margin-bottom:20px;
  border-left:3px solid;
  animation:fadeIn .18s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.tip-panel.t{border-color:var(--bl);color:var(--bl2)}
.tip-panel.d{border-color:var(--pu);color:#5b0d50}

/* ── NOTICE ── */
.notice{padding:12px 16px;border-radius:9px;font-size:13px;line-height:1.55;margin-bottom:20px;display:flex;gap:9px;align-items:flex-start}
.nw{background:#fffbeb;border:1px solid #fde68a;color:#78350f}
.ns{background:#fff1f2;border:1px solid #fecdd3;color:#9f1239}
.nn{background:#f0f9ff;border:1px solid #bae6fd;color:#0c4a6e}
.nni{flex-shrink:0;font-size:14px;margin-top:1px}

/* ── ANSWERS ── */
.choice-g{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px}
.ch{padding:18px 16px;background:var(--wh);border:2px solid var(--ln);border-radius:14px;font-family:inherit;cursor:pointer;text-align:left;transition:.16s;display:flex;align-items:center;gap:12px;width:100%}
.ch:hover{border-color:var(--bl);transform:translateY(-1px);box-shadow:0 4px 16px rgba(57,178,198,.1)}
.ch.sel{border-color:var(--bl);background:rgba(57,178,198,.06)}
.ch-ico{width:34px;height:34px;border-radius:9px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:.16s}
.ch.sel .ch-ico{background:var(--bl);color:var(--wh)}
.ch-lbl{font-size:14px;font-weight:600;display:block;color:var(--dk)}
.ch-sub{font-size:12px;color:var(--mt);display:block;margin-top:2px;font-weight:400}

.c3r{display:flex;gap:10px;margin-bottom:28px}
.c3{flex:1;padding:16px 12px;background:var(--wh);border:2px solid var(--ln);border-radius:14px;font-family:inherit;cursor:pointer;font-size:14px;font-weight:600;color:var(--mid);display:flex;flex-direction:column;align-items:center;gap:6px;transition:.16s}
.c3m{width:30px;height:30px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:14px;transition:.16s}
.c3:hover{border-color:var(--bl);transform:translateY(-1px)}
.c3.sj{border-color:#22c55e;background:rgba(34,197,94,.06);color:#166534}.c3.sj .c3m{background:#22c55e;color:var(--wh)}
.c3.sn{border-color:var(--ln);background:#fafafa;color:var(--mid)}.c3.sn .c3m{background:var(--mid);color:var(--wh)}
.c3.sw{border-color:var(--y);background:rgba(217,119,6,.06);color:#78350f}.c3.sw .c3m{background:var(--y);color:var(--wh)}

.sel-l{display:flex;flex-direction:column;gap:8px;margin-bottom:28px}
.sl{padding:14px 18px;background:var(--wh);border:2px solid var(--ln);border-radius:10px;font-family:inherit;font-size:14px;font-weight:500;color:var(--dk);cursor:pointer;text-align:left;transition:.15s;display:flex;align-items:center;justify-content:space-between}
.sl:hover{border-color:var(--bl);background:rgba(57,178,198,.04);transform:translateX(3px)}
.sl.sel{border-color:var(--bl);background:rgba(57,178,198,.07);color:var(--bl2);font-weight:600}
.sl-a{opacity:0;transition:.15s;color:var(--bl)}.sl.sel .sl-a,.sl:hover .sl-a{opacity:1}

.chips-h{font-size:12.5px;color:var(--mt);margin-bottom:12px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px}
.chip{padding:9px 17px;background:var(--wh);border:2px solid var(--ln);border-radius:30px;font-family:inherit;font-size:13.5px;font-weight:500;color:var(--dk);cursor:pointer;transition:.15s}
.chip:hover{border-color:var(--bl);background:rgba(57,178,198,.05)}
.chip.sel{background:var(--bl);border-color:var(--bl);color:var(--wh)}

.txt-w{margin-bottom:28px}
.txt-in{width:100%;padding:15px 18px;background:var(--wh);border:2px solid var(--ln);border-radius:14px;font-size:15px;font-family:inherit;color:var(--dk);outline:none;transition:.2s}
.txt-in:focus{border-color:var(--bl);box-shadow:0 0 0 3px rgba(57,178,198,.1)}
.txt-in::placeholder{color:#c2c8d3}

/* ── NAV ── */
.nav{display:flex;align-items:center;gap:12px}
.btn-n{padding:13px 34px;background:var(--dk);color:var(--wh);border:none;border-radius:10px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:.2s}
.btn-n:hover{background:var(--bl2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(45,129,142,.3)}
.btn-n:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}
.btn-n.last{background:var(--or)}.btn-n.last:hover{background:#c74310}
.btn-b{padding:13px 16px;background:none;border:2px solid var(--ln);border-radius:10px;font-size:14px;font-family:inherit;color:var(--mt);cursor:pointer;transition:.15s}
.btn-b:hover{border-color:var(--mt);color:var(--dk)}
.btn-b:disabled{opacity:.2;cursor:not-allowed}
.btn-sk{font-size:12px;color:var(--mt);text-decoration:underline;cursor:pointer;background:none;border:none;font-family:inherit;margin-left:auto}

/* ── WELCOME ── */
.wc{text-align:center;padding:8px 0 32px}
.wc-logo{margin-bottom:24px;display:inline-block}
.wc-logo svg{filter:drop-shadow(0 4px 16px rgba(231,81,19,.2))}
.wc-t{font-size:30px;font-weight:700;line-height:1.2;margin-bottom:18px}
.wc-t span{color:var(--bl)}
.wc-lead{font-size:15px;color:var(--mid);max-width:460px;margin:0 auto 24px;line-height:1.75}
.wc-divider{width:48px;height:3px;background:linear-gradient(90deg,var(--bl),var(--or));border-radius:2px;margin:0 auto 28px}
.wc-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:32px;text-align:left}
.wc-col{background:var(--bg);border-radius:12px;padding:18px 16px}
.wc-col-ico{font-size:22px;margin-bottom:8px}
.wc-col-t{font-size:13px;font-weight:700;color:var(--dk);margin-bottom:5px}
.wc-col-s{font-size:12px;color:var(--mid);line-height:1.55}
.wc-start{padding:15px 44px;background:var(--or);color:var(--wh);border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:.2s;margin-bottom:16px}
.wc-start:hover{background:#c74310;transform:translateY(-2px);box-shadow:0 8px 28px rgba(231,81,19,.3)}
.wc-foot{font-size:11.5px;color:var(--mt);margin-top:4px}
@media(max-width:580px){.wc-cols{grid-template-columns:1fr}}

/* ════════════ RAPPORT ════════════ */
.rpt{max-width:720px;margin:0 auto;padding:80px 24px 80px}
.rpt-head{margin-bottom:40px}
.rpt-super{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--mt);margin-bottom:8px}
.rpt-title{font-size:26px;font-weight:700;margin-bottom:6px}
.rpt-meta{font-size:13px;color:var(--mt)}
.verdict{padding:26px 30px;border-radius:14px;display:flex;align-items:flex-start;gap:18px;margin-bottom:32px;border:2px solid}
.vg{background:#f0fdf4;border-color:#86efac}.vy{background:#fffbeb;border-color:#fde068}.vr{background:#fff1f2;border-color:#fca5a5}
.v-ico{font-size:38px;flex-shrink:0;line-height:1}
.v-title{font-size:18px;font-weight:700;margin-bottom:5px}
.v-desc{font-size:14px;line-height:1.6;color:var(--mid)}
.dpia-row{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:8px;border:1.5px solid;font-size:13.5px;font-weight:500;margin-bottom:28px}
.dp-v{background:#fff1f2;border-color:#fca5a5;color:#9f1239}
.dp-w{background:#fffbeb;border-color:#fde068;color:#78350f}
.dp-o{background:#f0f9ff;border-color:#bae6fd;color:#0c4a6e}
.rsec{margin-bottom:36px}
.rsec-t{font-size:10.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mt);padding-bottom:10px;border-bottom:1px solid var(--ln);margin-bottom:16px}
.risk-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.rk{padding:13px 14px;border-radius:10px;border:1.5px solid;text-align:center}
.rk-lv{display:block;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-bottom:3px}
.rk-cat{font-size:13px;font-weight:500}
.rk.laag{background:#f0fdf4;border-color:#86efac;color:#166534}
.rk.middel{background:#fffbeb;border-color:#fde068;color:#713f12}
.rk.hoog{background:#fff7ed;border-color:#fdba74;color:#9a3412}
.rk.kritiek{background:#fff1f2;border-color:#fca5a5;color:#9f1239}
.act-l{display:flex;flex-direction:column;gap:8px}
.act{display:flex;align-items:flex-start;gap:10px;padding:12px 15px;border-radius:9px;font-size:13.5px;line-height:1.55}
.act-v{background:#fff1f2}.act-a{background:#fffbeb}
.bdg{font-size:9.5px;font-weight:700;padding:3px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0;margin-top:2px;text-transform:uppercase;letter-spacing:.3px}
.bv{background:var(--r);color:var(--wh)}.ba{background:var(--y);color:var(--wh)}
.doc-tags{display:flex;flex-wrap:wrap;gap:8px}
.dt{padding:8px 15px;border-radius:7px;font-size:13px;font-weight:500}
.dt-r{background:#fff1f2;color:#9f1239;border:1px solid #fca5a5}
.dt-y{background:#fffbeb;color:#78350f;border:1px solid #fde068}
.dt-n{background:var(--bg);color:var(--mid);border:1px solid var(--ln)}
.esc-l{display:flex;flex-direction:column;gap:8px}
.esc{padding:13px 16px;border-radius:10px;border:1.5px solid;display:flex;align-items:flex-start;gap:10px}
.e-fg{background:rgba(137,15,117,.05);border-color:rgba(137,15,117,.2);color:#6b0d5d}
.e-ci{background:rgba(231,81,19,.05);border-color:rgba(231,81,19,.2);color:#9a2f08}
.e-ju{background:rgba(57,178,198,.05);border-color:rgba(57,178,198,.3);color:var(--bl2)}
.e-in{background:#f0fdf4;border-color:#86efac;color:#166534}
.e-di{background:#fff1f2;border-color:#fca5a5;color:#9f1239}
.e-ic{flex-shrink:0;font-size:15px}
.e-role{font-weight:700;font-size:13px;display:block}
.e-why{font-size:11.5px;opacity:.75;margin-top:1px}
.oq-l{display:flex;flex-direction:column;gap:6px}
.oq{padding:10px 14px;background:#fffbeb;border-left:3px solid var(--y);border-radius:0 8px 8px 0;font-size:13px;color:#78350f}
.sum-g{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sum-box{background:var(--wh);border:1px solid var(--ln);border-radius:10px;padding:16px 18px}
.sum-lbl{font-size:9.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--mt);margin-bottom:10px}
.sum-row{font-size:13px;padding:2px 0;color:var(--mid)}
.sum-row strong{color:var(--dk);font-weight:600}
.aud-t{width:100%;border-collapse:collapse;font-size:12.5px}
.aud-t th{padding:8px 12px;text-align:left;font-weight:700;color:var(--mt);border-bottom:2px solid var(--ln);font-size:10px;letter-spacing:.8px;text-transform:uppercase}
.aud-t td{padding:8px 12px;border-bottom:1px solid var(--ln);color:var(--mid);vertical-align:top}
.aud-t td:last-child{color:var(--dk);font-weight:500}
.aud-t tr:hover td{background:#fafbfc}

/* ── LEVERANCIERSBEOORDELING BLOK ── */
.lev-blok{background:var(--wh);border:1.5px solid var(--ln);border-radius:14px;overflow:hidden;margin-bottom:36px}
.lev-head{padding:18px 22px;background:linear-gradient(135deg,#f0f9ff,#e8f5f8);border-bottom:1px solid var(--ln);display:flex;align-items:center;gap:12px}
.lev-head-t{font-size:15px;font-weight:700;color:var(--dk)}
.lev-head-s{font-size:12px;color:var(--mid);margin-top:2px}
.lev-steps{display:flex;padding:20px 22px;gap:0;overflow-x:auto}
.lev-step{flex:1;min-width:120px;position:relative;display:flex;flex-direction:column;align-items:center;text-align:center;padding:0 8px}
.lev-step:not(:last-child)::after{content:'→';position:absolute;right:-8px;top:14px;color:var(--mt);font-size:14px;z-index:1}
.ls-num{width:30px;height:30px;border-radius:50%;background:var(--bl);color:var(--wh);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-bottom:8px;flex-shrink:0}
.ls-t{font-size:12px;font-weight:700;color:var(--dk);margin-bottom:3px}
.ls-s{font-size:11px;color:var(--mid);line-height:1.4}
.lev-body{padding:16px 22px 20px;border-top:1px solid var(--ln)}
.lev-items{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.lev-item{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--mid);padding:10px 12px;background:var(--bg);border-radius:8px}
.lev-item strong{color:var(--dk);font-weight:600;display:block;font-size:12.5px;margin-bottom:2px}
.lev-item-ic{flex-shrink:0;font-size:14px;margin-top:1px}
.enisa-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:14px}
.enisa-pill{padding:7px 10px;background:rgba(57,178,198,.07);border:1px solid rgba(57,178,198,.2);border-radius:7px;font-size:11px;font-weight:600;color:var(--bl2);text-align:center}

/* ── EMAIL MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(26,33,53,.45);z-index:500;display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeIn .2s ease}
.modal{background:var(--wh);border-radius:16px;padding:32px 36px;max-width:480px;width:100%;box-shadow:0 24px 80px rgba(0,0,0,.18);animation:slideR .2s ease}
.modal-t{font-size:18px;font-weight:700;margin-bottom:8px}
.modal-s{font-size:13.5px;color:var(--mid);margin-bottom:22px;line-height:1.55}
.modal-in{width:100%;padding:13px 16px;border:2px solid var(--ln);border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:.2s;margin-bottom:16px}
.modal-in:focus{border-color:var(--bl);box-shadow:0 0 0 3px rgba(57,178,198,.1)}
.modal-summary{background:var(--bg);border-radius:10px;padding:14px 16px;font-size:12.5px;color:var(--mid);line-height:1.6;margin-bottom:20px;max-height:140px;overflow-y:auto}
.modal-summary strong{color:var(--dk)}
.modal-btns{display:flex;gap:10px;justify-content:flex-end}
.btn-modal-p{padding:11px 24px;background:var(--or);color:var(--wh);border:none;border-radius:8px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:.2s}
.btn-modal-p:hover{background:#c74310}
.btn-modal-s{padding:11px 18px;background:none;border:2px solid var(--ln);border-radius:8px;font-size:13px;font-family:inherit;color:var(--mid);cursor:pointer;transition:.15s}
.btn-modal-s:hover{border-color:var(--mt);color:var(--dk)}
.modal-note{font-size:11.5px;color:var(--mt);margin-top:12px;line-height:1.5}

/* ── REPORT FOOTER ── */
.rpt-foot{margin-top:44px;padding-top:22px;border-top:1px solid var(--ln);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.rpt-foot-note{font-size:12px;color:var(--mt)}
.rpt-foot-btns{display:flex;gap:10px;flex-wrap:wrap}
.btn-print{padding:10px 22px;background:var(--dk);color:var(--wh);border:none;border-radius:8px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:.2s}
.btn-print:hover{background:var(--bl2)}
.btn-mail{padding:10px 22px;background:var(--wh);color:var(--mid);border:2px solid var(--ln);border-radius:8px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:.2s}
.btn-mail:hover{border-color:var(--bl);color:var(--bl2)}

@media(max-width:580px){
  .tb{padding:0 16px}.pipe{padding:12px 16px}.inner{padding:40px 16px 80px}
  .q-text{font-size:21px}.choice-g{grid-template-columns:1fr}.c3r{gap:7px}
  .rpt{padding:70px 16px 60px}.sum-g{grid-template-columns:1fr}
  .rpt-foot{flex-direction:column;align-items:flex-start}
  .lev-items{grid-template-columns:1fr}.enisa-grid{grid-template-columns:1fr 1fr}
  .lev-steps{flex-direction:column;gap:8px}
  .lev-step:not(:last-child)::after{content:'↓';right:auto;top:auto;bottom:-12px;left:50%;transform:translateX(-50%)}
  .modal{padding:24px 20px}
}
@media print{
  .tb,.pipe,.btn-b,.btn-n,.btn-rst,.rpt-foot-btns,.modal-bg{display:none!important}
  body{background:var(--wh)}.rpt{padding:0}
}

/* ── DOCUMENT ANALYSIS ── */
.dropzone{border:2px dashed var(--ln);border-radius:14px;padding:40px 24px;text-align:center;cursor:pointer;transition:.2s;background:var(--bg)}
.dropzone:hover,.dz-hover{border-color:var(--bl);background:rgba(57,178,198,.04)}
.dz-inner{pointer-events:none}
.dz-ico{font-size:36px;margin-bottom:12px}
.dz-t{font-size:15px;font-weight:600;color:var(--dk);margin-bottom:4px}
.dz-s{font-size:13px;color:var(--mt)}
.dz-types{font-size:11px;color:var(--mt);margin-top:8px;letter-spacing:.5px}
.dz-filled .dz-t{color:var(--bl2)}
.doc-ok{font-size:13px;color:var(--g);font-weight:500;padding:8px 0}
.doc-err{font-size:13px;color:var(--r);font-weight:500;padding:8px 0}
.doc-loading{font-size:13px;color:var(--mt);padding:8px 0}
.spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.analysis-dots{display:flex;justify-content:center;gap:8px}
.analysis-dots span{width:10px;height:10px;border-radius:50%;background:var(--bl);animation:bounce .9s ease-in-out infinite}
.analysis-dots span:nth-child(2){animation-delay:.2s}
.analysis-dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-10px);opacity:1}}
/* welcome two-button layout */

.api-info{background:#f0f9ff;border:1px solid #bae6fd;border-radius:9px;padding:12px 16px;font-size:12.5px;color:#0c4a6e;margin-top:16px;line-height:1.6}
.api-info strong{font-weight:700}
.wc-routes{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.btn-route{display:flex;align-items:center;gap:14px;padding:16px 22px;border-radius:12px;border:2px solid;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;transition:.18s;text-align:left;width:100%}
.btn-route.primary{background:var(--or);border-color:var(--or);color:white}
.btn-route.primary:hover{background:#c74310;transform:translateY(-1px);box-shadow:0 6px 24px rgba(231,81,19,.3)}
.btn-route.secondary{background:white;border-color:var(--ln);color:var(--dk)}
.btn-route.secondary:hover{border-color:var(--bl);background:rgba(57,178,198,.04);transform:translateY(-1px)}
.btn-route .ri{font-size:22px;flex-shrink:0}
.btn-route .rt{display:flex;flex-direction:column}
.btn-route .rt-t{font-size:14px;font-weight:700}
.btn-route .rt-s{font-size:12px;font-weight:400;opacity:.75;margin-top:2px}
</style>

<body>
<header class="tb">
  <div style="display:flex;align-items:center">
    <div class="logo"><span class="lE">EEM</span><span class="lH">♥</span><span class="lA">HART</span></div>
    <div class="logo-div"></div>
    <span class="logo-sub">Situatiebeoordeling</span>
  </div>
  <div class="tb-r">
    <span class="tb-c" id="tbC"></span>
    <button class="btn-rst" onclick="doRestart()">↺ Opnieuw</button>
  </div>
</header>
<div class="pipe" id="pipe"><div class="pipe-in" id="pipeIn"></div></div>
<div class="stage" id="app"></div>
<div id="emailModal" style="display:none"></div>

<script>// ╔══════════════════════════════════════════════════════╗
// ║  CONFIGURATIE — vul hier eenmalig de API-sleutel in  ║
// ╚══════════════════════════════════════════════════════╝
var EEMHART_API_KEY = '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';
// Vul hierboven jouw Anthropic API-sleutel in tussen de aanhalingstekens,
// bijv: var EEMHART_API_KEY = 'sk-ant-api03-xxxx...';
// Laat leeg ('') om gebruikers om hun eigen sleutel te vragen.

// ══════════════════════════════════════════
//  STATE — toplevel only, no nesting
// ══════════════════════════════════════════
var A={};
var cur='welcome';
var dir=1;
var openTip=null;
var openOptTip=null;

// ══════════════════════════════════════════
//  PREDICATES
// ══════════════════════════════════════════
function hasPG()   { return A.pg    !== 'nee'; }
function hasSup()  { return A.ext   === 'ja';  }
function isAI()    { return A.useai === 'ja';  }
function buiten()  { return A.leer  === 'ja' || A.ops === 'buiten_eer'; }
function hasGZ()   { return A.gz    === 'ja';  }

var ord=['laag','middel','hoog','kritiek'];
function bump(a,b){ return ord.indexOf(b)>ord.indexOf(a)?b:a; }

function fmtA(v){
  if(v===undefined||v===null) return '—';
  if(Array.isArray(v)) return v.length?v.join(', '):'—';
  if(v==='ja')  return '✓ Ja';
  if(v==='nee') return '✗ Nee';
  if(v==='wn')  return '⚠ Nader te bepalen';
  return String(v);
}

// ══════════════════════════════════════════
//  NAVIGATION HELPERS
// ══════════════════════════════════════════
function vis(){ return S.filter(function(s){ return s.show(); }); }
function idx(id){ return vis().findIndex(function(s){ return s.id===id; }); }
function cs(){ return S.find(function(s){ return s.id===cur; }); }

function saveTxt(){
  var st=cs();
  if(st && st.type==='text'){
    var el=document.getElementById('tf_'+st.field);
    if(el) A[st.field]=el.value.trim();
  }
}

function goNext(){
  saveTxt();
  dir=1; openTip=null; openOptTip=null;
  var vs=vis();
  var i=idx(cur);
  if(i<0||i>=vs.length-1){ showReport(); return; }
  cur=vs[i+1].id;
  window.scrollTo({top:0,behavior:'smooth'});
  render();
}

function goPrev(){
  saveTxt();
  dir=-1; openTip=null; openOptTip=null;
  var vs=vis();
  var i=idx(cur);
  if(i<=0) return;
  cur=vs[i-1].id;
  window.scrollTo({top:0,behavior:'smooth'});
  render();
}

function pick(field,val,auto){
  A[field]=val;
  openOptTip=null;
  render();
  if(auto) setTimeout(goNext,460);
}

function toggleChip(field,val){
  if(!A[field]) A[field]=[];
  var i=A[field].indexOf(val);
  if(i>=0) A[field].splice(i,1); else A[field].push(val);
  render();
}

function toggleTip(id){
  openTip = openTip===id ? null : id;
  render();
}

function toggleOptTip(key,e){
  if(e && e.stopPropagation) e.stopPropagation();
  openOptTip = openOptTip===key ? null : key;
  render();
}

function checkNext(){
  var st=cs();
  if(!st||!st.req) return;
  var el=document.getElementById('tf_'+st.field);
  var btn=document.getElementById('nxt');
  if(el&&btn) btn.disabled=!el.value.trim();
}

function doRestart(){
  if(!confirm('Alle antwoorden wissen en opnieuw beginnen?')) return;
  var keys=Object.keys(A);
  for(var k=0;k<keys.length;k++) delete A[keys[k]];
  cur='welcome'; dir=1; openTip=null; openOptTip=null;
  document.getElementById('app').style.cssText='';
  document.getElementById('pipe').style.display='';
  document.getElementById('emailModal').style.display='none';
  render();
}

// ══════════════════════════════════════════
//  PIPELINE
// ══════════════════════════════════════════
var PM=[
  {id:'intake',lbl:'Intake'},
  {id:'gegevens',lbl:'Gegevens'},
  {id:'context',lbl:'Context'},
  {id:'leverancier',lbl:'Leverancier'},
  {id:'risico',lbl:'Risico'},
  {id:'beveiliging',lbl:'Beveiliging'},
  {id:'ai',lbl:'AI'}
];

function phSt(phId){
  var visS=S.filter(function(s){ return s.phase===phId&&s.show(); });
  var cp=cs();
  var curPhase=cp?cp.phase:'';
  var po=PM.map(function(p){ return p.id; });
  var ci=po.indexOf(curPhase);
  var ti=po.indexOf(phId);
  if(!visS.length) return 'skip';
  if(phId===curPhase) return 'active';
  if(ti<ci) return 'done';
  return 'future';
}

function renderPipe(){
  var cp=cs();
  if(!cp||cp.phase==='—'){
    document.getElementById('pipe').style.display='none';
    return;
  }
  document.getElementById('pipe').style.display='';
  var h='';
  for(var pi=0;pi<PM.length;pi++){
    var p=PM[pi];
    var st=phSt(p.id);
    var dotHtml='';
    var vsSteps=S.filter(function(s){ return s.phase===p.id&&s.show(); });
    if(vsSteps.length>1&&(st==='active'||st==='done')){
      dotHtml='<div class="pn-dots">';
      for(var di=0;di<vsSteps.length;di++){
        var ds=vsSteps[di];
        var isDone=ds.field&&A[ds.field]!==undefined;
        var isCur=ds.id===cur;
        dotHtml+='<span class="pd'+(isCur?' active':isDone?' done':'')+'"></span>';
      }
      dotHtml+='</div>';
    }
    h+='<div class="pn '+st+'">';
    h+='<div class="pc '+st+'">'+(st==='done'?'&#10003;':String(pi+1))+'</div>';
    h+='<div class="pn-lbl">'+p.lbl+'</div>';
    h+=dotHtml+'</div>';
    if(pi<PM.length-1){
      h+='<div class="pl'+(st==='done'?' done':'')+'"></div>';
    }
  }
  h+='<div class="pl"></div>';
  h+='<div class="pn future"><div class="pc future">&#10003;</div><div class="pn-lbl">Rapport</div></div>';
  document.getElementById('pipeIn').innerHTML=h;
}

// ══════════════════════════════════════════
//  RENDER HELPERS (top-level, no nesting)
// ══════════════════════════════════════════
function mkOptIc(ky,level){
  var cls='opt-ic '+(level==='t'?'t':'d')+' sm'+(openOptTip===ky?' on':'');
  var lbl=level==='t'?'i':'i+';
  return '<span class="'+cls+'" onclick="toggleOptTip(\''+ky+'\',event)">'+lbl+'</span>';
}

function mkOptPanel(ky,txt,cls){
  if(openOptTip!==ky||!txt) return '';
  return '<div class="tip-panel '+cls+' sm">'+txt+'</div>';
}

function mkC3Btn(f,val,emo,lbl,v_c,au_c,ct,stId){
  var isSel=v_c===val;
  var selCls=isSel?' s'+val.charAt(0):'';
  var ky=stId+':c3:'+val;
  var ic=ct&&ct[val]?mkOptIc(ky,'t'):'';
  var panel=ct&&ct[val]?mkOptPanel(ky,ct[val],'t'):'';
  return '<div><button class="c3'+selCls+'" onclick="pick(\''+f+'\',\''+val+'\','+au_c+')">'
    +'<span class="c3m">'+emo+'</span><span>'+lbl+'</span>'+ic
    +'</button>'+panel+'</div>';
}

// ══════════════════════════════════════════
//  MAIN RENDER
// ══════════════════════════════════════════
function render(){
  var st=cs();
  if(!st){ showReport(); return; }
  if(st.type==='welcome'){ renderWelcome(); renderPipe(); return; }
  renderPipe();

  var vs=vis();
  var i=idx(cur);
  var isLst=(i===vs.length-1);
  document.getElementById('tbC').textContent=i+' / '+(vs.length-1);

  // notice
  var notice='';
  if(st.notices&&A[st.field]){
    var ndata=st.notices[A[st.field]];
    if(ndata){
      var nico={nw:'⚠',ns:'⛑',nn:'i'}[ndata.t]||'i';
      notice='<div class="notice '+ndata.t+'"><span class="nni">'+nico+'</span><span>'+ndata.m+'</span></div>';
    }
  }

  // question-level tooltip icons
  var tipIcons='';
  if(st.short){
    var tc='tip-ic t'+(openTip==='t'?' on':'');
    tipIcons+='<span class="'+tc+'" onclick="toggleTip(\'t\')" title="Toelichting">i</span>';
  }
  if(st.deep){
    var dc='tip-ic d'+(openTip==='d'?' on':'');
    tipIcons+='<span class="'+dc+'" onclick="toggleTip(\'d\')" title="Verdieping">i+</span>';
  }
  if(tipIcons) tipIcons='<div class="tip-icons">'+tipIcons+'</div>';

  var tipPanel='';
  if(openTip==='t'&&st.short) tipPanel='<div class="tip-panel t">'+st.short+'</div>';
  if(openTip==='d'&&st.deep)  tipPanel='<div class="tip-panel d">'+st.deep+'</div>';

  // build input area
  var inp='';
  var field=st.field;
  var auto=!!st.auto;

  if(st.type==='text'){
    var tv=A[field]||'';
    inp='<div class="txt-w">'
      +'<input class="txt-in" type="text" id="tf_'+field+'"'
      +' value="'+tv.replace(/"/g,'&quot;')+'"'
      +' placeholder="'+(st.ph||'')+'"'
      +' oninput="checkNext()"'
      +' onkeypress="if(event.key===\'Enter\'){event.preventDefault();goNext()}">'
      +'</div>';
  }

  else if(st.type==='choice'){
    inp='<div class="choice-g">';
    var opts=st.opts||[];
    for(var oi=0;oi<opts.length;oi++){
      var o=opts[oi];
      var oSel=A[field]===o.v?' sel':'';
      var kyt=st.id+':'+o.v+':t';
      var kyd=st.id+':'+o.v+':d';
      var ict=o.tip?mkOptIc(kyt,'t'):'';
      var icd=o.deep?mkOptIc(kyd,'d'):'';
      var panel=mkOptPanel(kyt,o.tip,'t')+mkOptPanel(kyd,o.deep,'d');
      inp+='<div><button class="ch'+oSel+'" onclick="pick(\''+field+'\',\''+o.v+'\','+auto+')">'
        +'<span class="ch-ico">'+(o.ico||'')+'</span>'
        +'<span><span class="ch-lbl">'+(o.lbl||'')+'</span>'
        +'<span class="ch-sub">'+(o.sub||'')+'</span></span>'
        +'<div class="ch-tips">'+ict+icd+'</div>'
        +'</button>'+panel+'</div>';
    }
    inp+='</div>';
  }

  else if(st.type==='c3'){
    var vc=A[field];
    var ct=st.c3tips||{};
    inp='<div class="c3r">'
      +mkC3Btn(field,'ja','&#10003;','Ja',vc,auto,ct,st.id)
      +mkC3Btn(field,'nee','&#10005;','Nee',vc,auto,ct,st.id)
      +mkC3Btn(field,'wn','?','Onbekend',vc,auto,ct,st.id)
      +'</div>';
  }

  else if(st.type==='sel'){
    inp='<div class="sel-l">';
    var sopts=st.opts||[];
    for(var si=0;si<sopts.length;si++){
      var so=sopts[si];
      var sSel=A[field]===so.v?' sel':'';
      var skyt=st.id+':'+so.v+':t';
      var skyd=st.id+':'+so.v+':d';
      var sict=so.tip?mkOptIc(skyt,'t'):'';
      var sicd=so.deep?mkOptIc(skyd,'d'):'';
      var spanel=mkOptPanel(skyt,so.tip,'t')+mkOptPanel(skyd,so.deep,'d');
      inp+='<div><button class="sl'+sSel+'" onclick="pick(\''+field+'\',\''+so.v+'\','+auto+')">'
        +'<span>'+so.lbl+'</span>'
        +'<div style="display:flex;align-items:center;gap:5px">'+sict+sicd
        +'<span class="sl-a">&#8594;</span></div>'
        +'</button>'+spanel+'</div>';
    }
    inp+='</div>';
  }

  else if(st.type==='chips'){
    var csel=A[field]||[];
    var cPanels='';
    inp='<p class="chips-h">'+(st.hint||'')+'</p><div class="chips">';
    var copts=st.opts||[];
    for(var ci=0;ci<copts.length;ci++){
      var co=copts[ci];
      var cSel=csel.indexOf(co.v)>=0?' sel':'';
      var cky=st.id+':'+co.v+':t';
      var cic=co.tip?mkOptIc(cky,'t'):'';
      cPanels+=mkOptPanel(cky,co.tip,'t');
      inp+='<button class="chip'+cSel+'" onclick="toggleChip(\''+field+'\',\''+co.v+'\')">'+(co.lbl||'')+cic+'</button>';
    }
    inp+='</div>'+cPanels;
  }

  // nav
  var canNext=st.req
    ?(A[field]!==undefined&&(Array.isArray(A[field])?A[field].length>0:String(A[field]).trim().length>0))
    :true;

  var backDis=i===0?' disabled':'';
  var nxtCls='btn-n'+(isLst?' last':'');
  var nxtDis=canNext?'':' disabled';
  var nxtLbl=isLst?'Rapport genereren &#8594;':'Volgende &#8594;';
  var skip=st.req?'':'<button class="btn-sk" onclick="goNext()">Overslaan</button>';
  var hint=st.hint&&st.type!=='chips'?'<p class="q-hint">'+st.hint+'</p>':'';
  var cCard='card'+(dir<0?' back':'');

  var html='<div class="inner"><div class="'+cCard+'">'
    +'<div class="step-idx">'+st.phase.toUpperCase()+' &middot; Stap '+i+' van '+(vs.length-1)+'</div>'
    +'<div class="q-row"><h1 class="q-text">'+st.q+'</h1>'+tipIcons+'</div>'
    +hint+tipPanel+notice+inp
    +'<div class="nav">'
    +'<button class="btn-b"'+backDis+' onclick="goPrev()">&#8592;</button>'
    +'<button class="'+nxtCls+'"'+nxtDis+' id="nxt" onclick="goNext()">'+nxtLbl+'</button>'
    +skip
    +'</div>'
    +'</div></div>';

  document.getElementById('app').innerHTML=html;

  if(st.type==='text'){
    setTimeout(function(){
      var el=document.getElementById('tf_'+field);
      if(el) el.focus();
    },60);
  }
}

// ══════════════════════════════════════════
//  WELCOME
// ══════════════════════════════════════════
function renderWelcome(){
  document.getElementById('tbC').textContent='';
  document.getElementById('pipe').style.display='none';
  document.getElementById('app').innerHTML=
    '<div class="inner" style="max-width:640px;padding-top:60px;padding-bottom:80px">'
    +'<div class="card wc">'
    +'<div class="wc-logo"><svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M36 62C36 62 8 44 8 24C8 15.2 15.2 8 24 8C28.8 8 33.1 10.3 36 13.9C38.9 10.3 43.2 8 48 8C56.8 8 64 15.2 64 24C64 44 36 62 36 62Z" fill="#E75113"/><path d="M36 55C36 55 14 40 14 24.5C14 18.7 18.7 14 24.5 14C28.3 14 31.6 16 33.7 19C31.2 22.5 30 27 31 31.5C32.2 37 36.8 41.2 42.5 42C40.6 44.2 38.4 46.8 36 49.5V55Z" fill="#890F75" opacity="0.7"/><path d="M36 13.9C38.5 10.8 42.2 8.5 46.5 8.1C50.8 21.5 44.2 35.8 33.5 43.2C31.9 40.5 31 37.3 31 33.8C31 25.5 32.8 18.5 36 13.9Z" fill="#39B2C6" opacity="0.85"/></svg></div>'
    +'<h1 class="wc-t">Situatie<br><span>beoordelen</span></h1>'
    +'<p class="wc-lead">Een nieuwe app, leverancier of manier van werken verdient een korte check &#8212; niet als verplichting, maar als blijk van zorg: voor cliënten, medewerkers en Eemhart als geheel.</p>'

function calcRisk(){
  const R={privacy:'laag',beveiliging:'laag',leverancier:'laag',contract:'laag',continuiteit:'laag',ai:'laag',patientveiligheid:'laag'};
  if(hasPG())R.privacy=bump(R.privacy,'middel');
  if(hasGZ())R.privacy=bump(R.privacy,'hoog');
  if(A.bz==='ja')R.privacy=bump(R.privacy,'hoog');
  if(A.pg==='wn')R.privacy=bump(R.privacy,'middel');
  if(A.dprof==='ja')R.privacy=bump(R.privacy,'hoog');
  if(A.dmon==='ja')R.privacy=bump(R.privacy,'hoog');
  if(buiten())R.privacy=bump(R.privacy,'hoog');
  if(A.aitrain==='ja')R.privacy=bump(R.privacy,'kritiek');
  if(A.smfa==='nee')R.beveiliging=bump(R.beveiliging,'hoog');
  if(A.senc==='nee')R.beveiliging=bump(R.beveiliging,'hoog');
  if(A.smfa==='wn'||A.senc==='wn')R.beveiliging=bump(R.beveiliging,'middel');
  if(hasSup())R.leverancier=bump(R.leverancier,'middel');
  if(buiten())R.leverancier=bump(R.leverancier,'hoog');
  if(A.lcert==='nee')R.leverancier=bump(R.leverancier,'hoog');
  if(A.ltog==='ja')R.contract=bump(R.contract,'hoog');
  if(buiten())R.contract=bump(R.contract,'hoog');
  if(hasSup())R.contract=bump(R.contract,'middel');
  if(A.scont==='ja')R.continuiteit=bump(R.continuiteit,'hoog');
  if(isAI()){R.ai=bump(R.ai,'middel');if(A.aicdat==='ja')R.ai=bump(R.ai,'hoog');if(A.aitrain==='ja')R.ai=bump(R.ai,'kritiek');if(A.aizorg==='ja')R.ai=bump(R.ai,'hoog');if(A.aictrl==='nee')R.ai=bump(R.ai,'hoog')}
  if((A.wie||[]).includes('cliënten'))R.patientveiligheid=bump(R.patientveiligheid,'middel');
  if(A.aizorg==='ja')R.patientveiligheid=bump(R.patientveiligheid,'hoog');
  if(A.scont==='ja')R.patientveiligheid=bump(R.patientveiligheid,'middel');
  return R;
}

function dpiaStatus(){
  if(!hasPG())return false;
  let s=0;
  if(hasGZ())s+=3;if(A.bz==='ja')s+=2;if(A.dprof==='ja')s+=2;if(A.dmon==='ja')s+=2;
  if(A.dinno==='ja')s+=2;if(A.dkwets==='ja')s+=2;if(A.kop==='ja')s+=1;
  if(buiten())s+=1;if(A.aicdat==='ja')s+=2;if(A.aizorg==='ja')s+=2;
  if(s>=5)return'verplicht';if(s>=3)return'waarschijnlijk';if(s>=1)return'overwegen';
  return false;
}

function verdict(R){
  const v=Object.values(R);
  if(v.includes('kritiek'))return'rood';if(v.includes('hoog'))return'geel';if(v.includes('middel'))return'geel';return'groen';
}

function getActions(){
  const vp=[],aa=[];const dp=dpiaStatus();
  if(hasPG()){vp.push('Controleer of de verwerking is opgenomen in het verwerkingsregister. Voeg toe of actualiseer de bestaande registratie.');vp.push('Leg de verwerkingsgrondslag schriftelijk vast, inclusief onderbouwing.');aa.push('Informeer betrokkenen conform AVG art. 13/14 (transparantieverplichtingen).')}
  if(hasGZ()||A.bz==='ja')vp.push('Leg de aanvullende grondslag voor bijzondere persoonsgegevens (AVG art. 9) schriftelijk vast.');
  if(hasSup()&&A.ltog==='ja')vp.push('Sluit een verwerkersovereenkomst met de leverancier. Dit is wettelijk verplicht (AVG art. 28).');
  if(hasSup()){vp.push('Voer een leveranciersbeoordeling uit (BIV-classificatie, ENISA 12 maatregelen, productbeveiliging). Gebruik het Eemhart leveranciersbeoordeling-template.');aa.push('Toets het contract aan de Eemhart inkoopvoorwaarden (AIVG 2022 en Module ICT).')}
  if(dp==='verplicht')vp.push('Voer een DPIA uit vóórdat de verwerking start. Betrek de FG voor begeleiding en eindoordeel.');
  else if(dp==='waarschijnlijk')vp.push('Laat de FG beoordelen of een DPIA verplicht is. Voer deze bij twijfel uit.');
  else if(dp==='overwegen')aa.push('Bespreek met de FG of een beknopte privacytoets of pre-DPIA zinvol is.');
  if(buiten()){vp.push('Zorg voor passende juridische waarborgen voor gegevensdoorgifte buiten de EER (bijv. Standard Contractual Clauses conform AVG art. 46).');vp.push('Beoordeel of voor het betreffende land een adequaatheidsbesluit van de Europese Commissie geldt.')}
  if(A.smfa==='nee'||A.smfa==='wn')vp.push('Eis dat meervoudige authenticatie (MFA) beschikbaar en verplicht is voor alle gebruikers van dit systeem.');
  if(A.senc==='nee')vp.push('Implementeer encryptie voor opslag (at rest) en transport (in transit) van persoonsgegevens.');
  if(A.grond==='wn')vp.push('Bepaal de verwerkingsgrondslag vóór de start. Persoonsgegevens mogen niet worden verwerkt zonder vastgelegde grondslag.');
  if(isAI()&&A.aicdat==='ja')vp.push('Verifieer of de AI-leverancier persoonsgegevens opslaat of voor training inzet. Stop gebruik totdat dit is vastgesteld.');
  if(A.aitrain==='ja')vp.push('Staak het gebruik van (gezondheids)gegevens in deze AI-dienst zolang de leverancier deze voor modeltraining inzet.');
  if(A.aizorg==='ja')vp.push('Zorg dat elke AI-uitkomst voor cliënten door een bevoegde medewerker wordt beoordeeld vóór gebruik (human in the loop).');
  if(isAI())aa.push('Voer een AI-governance beoordeling uit conform het beleid van Eemhart.');
  if(A.aizorg==='ja')aa.push('Beoordeel of de AI kwalificeert als medisch hulpmiddel (MDR/IVDR). Raadpleeg hiervoor een specialist.');
  if(A.scont==='ja')aa.push('Neem SLA-eisen, back-upverplichtingen en herstelplannen (RTO/RPO) op in het contract met de leverancier.');
  if(A.lcert==='nee')aa.push('Vraag de leverancier om inzage in hun beveiligingsniveau (bijv. ISO 27001 SoA, ISAE 3402, TPM) en leg een auditrecht vast.');
  return{vp,aa};
}

function getEscalations(){
  const dp=dpiaStatus();const R=calcRisk();const esc=[];
  if(dp==='verplicht'||dp==='waarschijnlijk')esc.push({cls:'e-fg',ic:'🔒',role:'FG (Functionaris Gegevensbescherming)',why:'DPIA-beoordeling vereist'});
  if(hasGZ()||A.bz==='ja')esc.push({cls:'e-fg',ic:'🔒',role:'Privacy Officer / FG',why:'Bijzondere persoonsgegevens aanwezig'});
  if(R.beveiliging==='hoog'||R.beveiliging==='kritiek')esc.push({cls:'e-ci',ic:'🛡️',role:'CISO / Security Officer',why:'Beveiligingsrisico vereist security assessment'});
  if(hasSup())esc.push({cls:'e-in',ic:'📋',role:'Inkoop / Contractbeheer',why:'Leveranciersbeoordeling en contractreview'});
  if(buiten()||A.ltog==='ja')esc.push({cls:'e-ju',ic:'⚖️',role:'Juridische Zaken',why:'Contractuele toetsing verwerkersovereenkomst en/of internationale doorgifte'});
  if(isAI()&&A.aizorg==='ja')esc.push({cls:'e-di',ic:'🏥',role:'Directie / Medisch adviseur',why:'AI met invloed op zorgbeslissingen'});
  if(isAI())esc.push({cls:'e-fg',ic:'🤖',role:'FG + CISO (AI-governance)',why:'AI-toepassing met persoonsgegevens'});
  const seen=new Set();return esc.filter(e=>{if(seen.has(e.role))return false;seen.add(e.role);return true});
}

function openQs(){
  const q=[];
  if(A.pg==='wn')q.push('Worden er persoonsgegevens verwerkt? Laat dit verifiëren door de Privacy Officer.');
  if(A.grond==='wn')q.push('Wat is de juridische grondslag voor de verwerking van persoonsgegevens?');

function buildTextSummary(risks,dp,acts){
  const vm={groen:'Groen licht',geel:'Toegestaan onder voorwaarden',rood:'Nog niet gereed voor gebruik'};
  const v=verdict(risks);
  let t=`SITUATIEBEOORDELING EEMHART\n`;
  t+=`${'='.repeat(40)}\n`;
  t+=`Situatie: ${A.naam||'—'}\n`;
  t+=`Datum: ${new Date().toLocaleDateString('nl-NL',{day:'numeric',month:'long',year:'numeric'})}\n`;
  t+=`Eigenaar: ${A.eig||'—'} | Afdeling: ${A.afd||'—'}\n\n`;
  t+=`OORDEEL: ${vm[v]}\n\n`;
  if(dp){const dm={verplicht:'VERPLICHT',waarschijnlijk:'WAARSCHIJNLIJK VEREIST',overwegen:'AANBEVOLEN'};t+=`DPIA: ${dm[dp]}\n\n`}
  t+=`VERPLICHTE ACTIES (${acts.vp.length}):\n`;
  acts.vp.forEach((a,i)=>t+=`${i+1}. ${a}\n`);
  t+=`\nAANBEVOLEN ACTIES (${acts.aa.length}):\n`;
  acts.aa.forEach((a,i)=>t+=`${i+1}. ${a}\n`);
  t+=`\n${'='.repeat(40)}\nGenod via Eemhart Situatiebeoordeling tool`;
  return t;
}

  if(isAI())docs.push({t:'AI-governance beoordeling',c:'dt-y'});
  if(hasPG())docs.push({t:'Verwerkingsregister (bijwerken)',c:'dt-n'});
  if(A.scont==='ja')docs.push({t:'Continuïteits- en herstelplan',c:'dt-y'});
  const audRows=S.filter(s=>s.field&&A[s.field]!==undefined).map(s=>`<tr><td>${s.phase}</td><td>${s.q}</td><td>${fmtA(A[s.field])}</td></tr>`).join('');

  document.getElementById('app').style.cssText='display:block;padding-top:118px';

    </div>

    <div class="rsec">

    </div>

    ${oqs.length?`<div class="rsec"><div class="rsec-t">Nog uit te zoeken</div><div class="oq-l">${oqs.map(q=>`<div class="oq">🔍 ${q}</div>`).join('')}</div></div>`:''}

    <div class="rsec">

        <div class="sum-box"><div class="sum-lbl">Gegevensprofiel</div>
          <div class="sum-row"><strong>Persoonsgegevens:</strong> ${fmtA(A.pg)}</div>
          <div class="sum-row"><strong>Gezondheidsgegevens:</strong> ${fmtA(A.gz)}</div>

          <div class="sum-row"><strong>Opslaglocatie:</strong> ${A.ops||'—'}</div>

        </div>
      </div>
    </div>

    <div class="rsec">
      <div class="rsec-t">Audittrail — alle antwoorden</div>
      <table class="aud-t"><thead><tr><th>Onderdeel</th><th>Vraag</th><th>Antwoord</th></tr></thead>
      <tbody>${audRows||'<tr><td colspan="3" style="color:var(--mt)">Geen antwoorden geregistreerd.</td></tr>'}</tbody></table>
    </div>

    <div class="rpt-foot">

        <button class="btn-rst" onclick="doRestart()">↺ Nieuwe beoordeling</button>
        <button class="btn-mail" onclick="showEmailModal()">✉ Mailen</button>
        <button class="btn-print" onclick="window.print()">Afdrukken / PDF</button>

  </div>`;
}

var docText = '';
var docBase64 = '';
var docMediaType = '';

function backToWelcome() {
  analysisMode = false;
  docFile = null; docText = ''; docBase64 = ''; docMediaType = ''; docIsImage = false; docIsPdf = false;
  cur = 'welcome';

function dzOver(e) {
  e.preventDefault();
  document.getElementById('dropzone').classList.add('dz-hover');
}
function dzLeave(e) {
  document.getElementById('dropzone').classList.remove('dz-hover');
}
function dzDrop(e) {
  e.preventDefault();
  document.getElementById('dropzone').classList.remove('dz-hover');
  var files = e.dataTransfer.files;
  if (files.length > 0) processDocFile(files[0]);
}
function dzFile(inp) {
  if (inp.files.length > 0) processDocFile(inp.files[0]);
}

function processDocFile(file) {
  docFile = file;
  var ext = file.name.split('.').pop().toLowerCase();
  var status = document.getElementById('docStatus');
  status.innerHTML = '<div class="doc-loading"><span class="spin">&#9696;</span> Bestand inlezen: <strong>'+file.name+'</strong></div>';

  document.getElementById('dropzone').innerHTML =
    '<div class="dz-inner dz-filled">'
    +'<div class="dz-ico">&#128196;</div>'
    +'<div class="dz-t">'+file.name+'</div>'
    +'<div class="dz-s">'+Math.round(file.size/1024)+' KB</div>'
    +'</div>';

  if (ext === 'pdf') {
    docIsPdf = true; docIsImage = false;
    var reader = new FileReader();
    reader.onload = function(e) {
      var b64 = e.target.result.split(',')[1];
      docBase64 = b64;
      docMediaType = 'application/pdf';
      docText = '';
      status.innerHTML = '<div class="doc-ok">&#10003; PDF gereed &mdash; klik Analyseren om te starten</div>';
      document.getElementById('analyzeBtn').disabled = false;
    };
    reader.readAsDataURL(file);

  } else if (ext === 'docx') {
    docIsPdf = false; docIsImage = false;
    // Use mammoth to extract text from DOCX
    var script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js';
    script.onload = function() {
      var reader = new FileReader();
      reader.onload = function(e) {
        mammoth.extractRawText({arrayBuffer: e.target.result}).then(function(result) {
          docText = result.value;
          docBase64 = '';
          docMediaType = '';
          if (docText.length < 50) {
            // Might be image-based DOCX - fallback to base64 send
            docText = '[DOCX bevat weinig tekst — mogelijk afbeeldingen. Bestandsnaam: '+file.name+']';
          }
          status.innerHTML = '<div class="doc-ok">&#10003; DOCX gelezen ('+docText.length+' tekens) &mdash; klik Analyseren</div>';
          document.getElementById('analyzeBtn').disabled = false;
        }).catch(function(err) {
          status.innerHTML = '<div class="doc-err">&#10005; Kon DOCX niet lezen: '+err.message+'</div>';
        });
      };
      reader.readAsArrayBuffer(file);
    };
    script.onerror = function() {
      // Fallback: just use filename and ask user
      docText = 'DOCX bestand: '+file.name+' (kon niet worden uitgelezen)';
      status.innerHTML = '<div class="doc-ok">&#10003; Bestand geselecteerd &mdash; klik Analyseren</div>';
      document.getElementById('analyzeBtn').disabled = false;
    };
    document.head.appendChild(script);

  } else if (ext === 'png' || ext === 'jpg' || ext === 'jpeg') {
    docIsImage = true; docIsPdf = false;
    var reader = new FileReader();
    reader.onload = function(e) {
      var b64 = e.target.result.split(',')[1];
      docBase64 = b64;
      docMediaType = ext === 'png' ? 'image/png' : 'image/jpeg';
      docText = '';
      status.innerHTML = '<div class="doc-ok">&#10003; Afbeelding gereed &mdash; klik Analyseren</div>';
      document.getElementById('analyzeBtn').disabled = false;
    };
    reader.readAsDataURL(file);
  } else {
    status.innerHTML = '<div class="doc-err">&#10005; Onbekend bestandsformaat. Gebruik PDF, DOCX, PNG of JPG.</div>';
  }
}

function clearApiKey() {
  sessionStorage.removeItem('eemhart_api_key');
  var el = document.getElementById('apiKeyStatus');
  if (el) el.textContent = 'API-sleutel gewist.';
}
function retryWithNewKey() {
  sessionStorage.removeItem('eemhart_api_key');
  runAnalysis();
}

function runAnalysis() {
  document.getElementById('app').innerHTML =
    '<div class="inner" style="max-width:660px;padding-top:80px;padding-bottom:80px;text-align:center">'
    +'<div class="card" style="padding:48px 32px">'
    +'<div style="font-size:48px;margin-bottom:20px">&#128269;</div>'
    +'<h2 style="font-size:20px;font-weight:600;margin-bottom:12px">Document wordt geanalyseerd&hellip;</h2>'
    +'<p style="color:var(--mid);font-size:14px;margin-bottom:28px">De AI leest het document en beoordeelt privacyrisico&apos;s, beveiligingsaspecten en contractvereisten.</p>'
    +'<div class="analysis-dots"><span></span><span></span><span></span></div>'
    +'</div></div>';

  // Build the API message content
  var msgContent = [];

  if (docIsPdf) {
    msgContent.push({
      type: 'document',
      source: { type: 'base64', media_type: docMediaType, data: docBase64 }
    });
  } else if (docIsImage) {
    msgContent.push({
      type: 'image',
      source: { type: 'base64', media_type: docMediaType, data: docBase64 }
    });
  }

  var textPrompt = '';
  if (docText) {
    textPrompt = 'DOCUMENTINHOUD:\n\n' + docText.substring(0, 15000) + '\n\n';
  }

  textPrompt += ANALYSIS_PROMPT;
  msgContent.push({ type: 'text', text: textPrompt });

  // Use built-in key if configured, otherwise ask user
  var apiKey = '';
  if (typeof EEMHART_API_KEY !== 'undefined' && EEMHART_API_KEY && EEMHART_API_KEY.trim()) {
    apiKey = EEMHART_API_KEY.trim();
  } else {
    apiKey = sessionStorage.getItem('eemhart_api_key') || '';
    if (!apiKey) {
      var k = prompt('Voer je Anthropic API-sleutel in (begint met sk-ant-...):\n\nDeze wordt alleen lokaal opgeslagen en niet verzonden.');
      if (!k || !k.trim()) { backToWelcome(); return; }
      sessionStorage.setItem('eemhart_api_key', k.trim());
      apiKey = k.trim();
    }
  }
  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 4000,
      messages: [{ role: 'user', content: msgContent }]
    })
  })
  .then(function(r) {
    if (!r.ok) {
      if (r.status === 401) { sessionStorage.removeItem('eemhart_api_key'); }
      return r.json().then(function(e){ throw new Error((e.error&&e.error.message)||'API-fout '+r.status); });
    }
    return r.json();
  })
  .then(function(data) {
    var raw = '';
    for (var i = 0; i < data.content.length; i++) {
      if (data.content[i].type === 'text') raw += data.content[i].text;
    }
    // Extract JSON from response
    var jsonMatch = raw.match(/```json\s*([\s\S]*?)```/) || raw.match(/\{[\s\S]*\}/);
    var parsed;
    try {
      var jsonStr = jsonMatch ? (jsonMatch[1] || jsonMatch[0]) : raw;
      parsed = JSON.parse(jsonStr.trim());
    } catch(e) {
      parsed = { error: 'Kon JSON niet parsen', raw: raw };
    }
    renderDocReport(parsed, docFile ? docFile.name : 'Document');
  })
  .catch(function(err) {
    // On auth error, clear stored key so user can re-enter
    if (err.message && (err.message.indexOf('401') >= 0 || err.message.indexOf('auth') >= 0)) {
      sessionStorage.removeItem('eemhart_api_key');
    }
    var errTip = err.message === 'Failed to fetch'
      ? 'Netwerkfout. Controleer of je internetverbinding actief is. Als je het bestand lokaal opent via file://, probeer het dan via GitHub Pages of een lokale server.'
      : err.message;
    document.getElementById('app').innerHTML =
      '<div class="inner"><div class="card" style="padding:40px">'
      +'<div style="color:var(--r);font-size:14px;margin-bottom:12px"><strong>Fout bij analyse:</strong> '+err.message+'</div>'
      +'<div style="font-size:13px;color:var(--mt);margin-bottom:20px">'+errTip+'</div>'
      +'<div style="display:flex;gap:10px">'
      +'<button class="btn-b" onclick="backToWelcome()">&#8592; Terug</button>'
      +'<button class="btn-n" onclick="retryWithNewKey()">Andere API-sleutel proberen</button>'
      +'</div></div></div>';
  });
}

var ANALYSIS_PROMPT = 'Je bent een senior privacy- en complianceadviseur gespecialiseerd in de zorg (Eemhart). Analyseer het bovenstaande document (offerte, contract, productbeschrijving of vergelijkbaar) en beoordeel de privacy- en beveiligingsaspecten.\n\nGeef je antwoord UITSLUITEND als geldig JSON (geen tekst ervoor of erna), in dit exacte formaat:\n\n```json\n{\n  "document_naam": "naam van het product/project",\n  "leverancier": "naam leverancier indien bekend",\n  "samenvatting": "2-3 zinnen over wat het document beschrijft",\n  "verdict": "groen|geel|rood",\n  "verdict_toelichting": "korte onderbouwing van het eindoordeel",\n  "dpia_status": "verplicht|waarschijnlijk|overwegen|niet_vereist",\n  "dpia_toelichting": "waarom wel/niet",\n  "risico_scores": {\n    "privacy": "laag|middel|hoog|kritiek",\n    "beveiliging": "laag|middel|hoog|kritiek",\n    "leverancier": "laag|middel|hoog|kritiek",\n    "contract": "laag|middel|hoog|kritiek",\n    "continuiteit": "laag|middel|hoog|kritiek",\n    "ai": "laag|middel|hoog|kritiek",\n    "patientveiligheid": "laag|middel|hoog|kritiek"\n  },\n  "persoonsgegevens": {\n    "aanwezig": true,\n    "categorieën": ["medewerkersgegevens","cliëntgegevens"],\n    "gezondheidsgegevens": false,\n    "toelichting": "welke gegevens precies"\n  },\n  "verplichte_acties": [\n    "Concrete actie 1",\n    "Concrete actie 2"\n  ],\n  "aanbevolen_acties": [\n    "Aanbeveling 1"\n  ],\n  "benodigde_documenten": [\n    {"naam": "Verwerkersovereenkomst (VOK)", "urgentie": "kritiek|hoog|normaal"},\n    {"naam": "DPIA", "urgentie": "kritiek|hoog|normaal"}\n  ],\n  "escalaties": [\n    {"rol": "FG (Functionaris Gegevensbescherming)", "reden": "DPIA vereist"},\n    {"rol": "Inkoop / Contractbeheer", "reden": "Contractreview nodig"}\n  ],\n  "open_vragen": [\n    "Vraag die het document niet beantwoordt",\n    "Andere ontbrekende informatie"\n  ],\n  "ontbrekende_info": "Toelichting op wat niet in het document staat maar wel relevant is"\n}\n```\n\nWees kritisch en grondig. Let specifiek op: persoonsgegevens, opslaglocatie (cloud/land), beveiliging (MFA/encryptie), subverwerkers, OR-instemmingsrecht, verwerkersovereenkomst, DPIA-noodzaak, AI-toepassingen en continuïteitsrisico.';

function renderDocReport(data, fileName) {
  if (data.error) {
    document.getElementById('app').innerHTML =
      '<div class="inner"><div class="card" style="padding:40px">'
      +'<div style="color:var(--r);margin-bottom:16px"><strong>Analyse mislukt:</strong> '+data.error+'</div>'
      +'<div style="font-size:12px;color:var(--mt);white-space:pre-wrap;max-height:200px;overflow-y:auto">'+data.raw+'</div>'
      +'<button class="btn-b" style="margin-top:16px" onclick="backToWelcome()">&#8592; Terug</button>'
      +'</div></div>';
    return;
  }

  var v = data.verdict || 'geel';
  var vCls = {groen:'vg', geel:'vy', rood:'vr'}[v] || 'vy';
  var vIco = {groen:'&#9989;', geel:'&#9888;&#65039;', rood:'&#128683;'}[v] || '&#9888;&#65039;';
  var vTitle = {groen:'Voorzichtig groen licht', geel:'Toegestaan onder voorwaarden', rood:'Nog niet gereed voor gebruik'}[v] || '';

  var rLbls = {privacy:'Privacy', beveiliging:'Beveiliging', leverancier:'Leverancier',
    contract:'Contract', continuiteit:'Continuïteit', ai:'AI', patientveiligheid:'Pati&euml;ntveiligheid'};
  var risks = data.risico_scores || {};

  // Risk grid
  var riskHtml = '<div class="risk-g">';
  for (var k in rLbls) {
    var lv = risks[k] || 'laag';
    riskHtml += '<div class="rk '+lv+'"><span class="rk-lv">'+lv+'</span><span class="rk-cat">'+rLbls[k]+'</span></div>';
  }
  riskHtml += '</div>';

  // DPIA pill
  var dpMap = {
    verplicht: {cls:'dp-v', txt:'DPIA verplicht &mdash; betrek de FG v&oacute;&oacute;r de start.'},
    waarschijnlijk: {cls:'dp-w', txt:'DPIA waarschijnlijk vereist &mdash; laat de FG dit beoordelen.'},
    overwegen: {cls:'dp-o', txt:'Privacytoets aanbevolen &mdash; bespreek met de Privacy Officer.'},
    niet_vereist: null
  };
  var dpLabel = dpMap[data.dpia_status] || null;
  var dpHtml = dpLabel ? '<div class="dpia-row '+dpLabel.cls+'">&#128203; <strong>DPIA:</strong>&nbsp;'+dpLabel.txt+'</div>' : '';

  // Verplichte acties
  var vp = data.verplichte_acties || [];
  var vpHtml = vp.length
    ? '<div class="act-l">'+vp.map(function(a){return '<div class="act act-v"><span class="bdg bv">Verplicht</span><span>'+a+'</span></div>';}).join('')+'</div>'
    : '<p style="color:var(--g);font-size:14px;font-weight:500">Geen verplichte acties ge&iuml;dentificeerd.</p>';

  // Aanbevolen acties
  var aa = data.aanbevolen_acties || [];
  var aaHtml = aa.length
    ? '<div class="act-l">'+aa.map(function(a){return '<div class="act act-a"><span class="bdg ba">Aanbevolen</span><span>'+a+'</span></div>';}).join('')+'</div>'
    : '<p style="color:var(--mt);font-size:14px">Geen aanvullende aanbevelingen.</p>';

  // Documenten
  var docs = data.benodigde_documenten || [];
  var docUrgCls = {kritiek:'dt-r', hoog:'dt-y', normaal:'dt-n'};
  var docsHtml = docs.map(function(d){
    return '<span class="dt '+(docUrgCls[d.urgentie]||'dt-n')+'">'+d.naam+'</span>';
  }).join('');

  // Escalaties
  var escMap = {
    'FG': 'e-fg', 'Privacy': 'e-fg', 'CISO': 'e-ci', 'Security': 'e-ci',
    'Juridisch': 'e-ju', 'Inkoop': 'e-in', 'Directie': 'e-di', 'Medisch': 'e-di'
  };
  var escs = data.escalaties || [];
  var escHtml = escs.length ? '<div class="esc-l">'+escs.map(function(e){
    var cls = 'e-ju';
    for (var k in escMap) { if (e.rol.indexOf(k) >= 0) { cls = escMap[k]; break; } }
    return '<div class="esc '+cls+'"><span class="e-ic">&#128100;</span><div><span class="e-role">'+e.rol+'</span><span class="e-why">'+e.reden+'</span></div></div>';
  }).join('')+'</div>'
  : '<p style="color:var(--g);font-size:14px;font-weight:500">Geen escalaties noodzakelijk.</p>';

  // Open vragen
  var oqs = data.open_vragen || [];
  var oqHtml = oqs.length ? '<div class="oq-l">'+oqs.map(function(q){return '<div class="oq">&#128269; '+q+'</div>';}).join('')+'</div>' : '';

  var now = new Date().toLocaleDateString('nl-NL', {day:'numeric', month:'long', year:'numeric'});

  document.getElementById('pipe').style.display = 'none';
  document.getElementById('app').style.cssText = 'display:block;padding-top:118px';
  document.getElementById('app').innerHTML =
    '<div class="rpt">'

    // Header
    +'<div class="rpt-head">'
    +'<div class="rpt-super">Documentanalyse &middot; Eemhart</div>'
    +'<div class="rpt-title">'+(data.document_naam||fileName)+'</div>'
    +'<div class="rpt-meta">'+(data.leverancier||'')+(data.leverancier?' &middot; ':'')+now
    +'&nbsp;<span style="background:#fef9c3;color:#78350f;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600">Op basis van documentinhoud</span>'
    +'</div>'
    +'</div>'

    // Samenvatting box
    +(data.samenvatting ? '<div style="background:var(--bg);border-radius:10px;padding:16px 20px;margin-bottom:28px;font-size:14px;color:var(--mid);line-height:1.65;border-left:3px solid var(--bl)">'+data.samenvatting+'</div>' : '')

    // Verdict
    +'<div class="verdict '+vCls+'">'
    +'<div class="v-ico">'+vIco+'</div>'
    +'<div><div class="v-title">'+vTitle+'</div>'
    +'<div class="v-desc">'+(data.verdict_toelichting||'')+'</div></div>'
    +'</div>'

    +dpHtml

    // Risicoscores
    +'<div class="rsec"><div class="rsec-t">Risicoanalyse per categorie</div>'+riskHtml+'</div>'

    // Persoonsgegevens
    +(data.persoonsgegevens ? '<div class="rsec"><div class="rsec-t">Persoonsgegevens</div>'
      +'<div style="background:var(--bg);border-radius:10px;padding:14px 16px;font-size:13.5px;line-height:1.65">'
      +(data.persoonsgegevens.aanwezig ? '&#9989; <strong>Aanwezig</strong>' : '&#10060; Niet aanwezig')
      +(data.persoonsgegevens.gezondheidsgegevens ? ' &middot; <strong style="color:var(--r)">Gezondheidsgegevens</strong>' : '')
      +(data.persoonsgegevens.categorieën && data.persoonsgegevens.categorieën.length ? ' &middot; '+data.persoonsgegevens.categorieën.join(', ') : '')
      +(data.persoonsgegevens.toelichting ? '<br><span style="color:var(--mid)">'+data.persoonsgegevens.toelichting+'</span>' : '')
      +'</div></div>' : '')

    // Verplichte acties
    +'<div class="rsec"><div class="rsec-t">Verplichte acties</div>'+vpHtml+'</div>'

    // Aanbevolen acties
    +'<div class="rsec"><div class="rsec-t">Aanbevolen acties</div>'+aaHtml+'</div>'

    // Documenten
    +(docs.length ? '<div class="rsec"><div class="rsec-t">Benodigde documenten</div><div class="doc-tags">'+docsHtml+'</div></div>' : '')

    // Escalaties
    +'<div class="rsec"><div class="rsec-t">Te betrekken functionarissen</div>'+escHtml+'</div>'

    // Open vragen
    +(oqHtml ? '<div class="rsec"><div class="rsec-t">Nog uit te zoeken (ontbreekt in document)</div>'+oqHtml+'</div>' : '')

    // Ontbrekende info disclaimer
    +(data.ontbrekende_info ? '<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:14px 18px;font-size:13px;color:#78350f;margin-bottom:32px">'
      +'<strong>Let op:</strong> '+data.ontbrekende_info+'<br>Voor een volledig beeld, doorloop de stap-voor-stap beoordeling.'
      +'</div>' : '')

    // Footer
    +'<div class="rpt-foot">'
    +'<span class="rpt-foot-note">Documentanalyse &middot; Eemhart &middot; '+now+'</span>'
    +'<div class="rpt-foot-btns">'
    +'<button class="btn-rst" onclick="backToWelcome()">&#8617; Nieuwe analyse</button>'
    +'<button class="btn-rst" onclick="cur=\'welcome\';goNext()" style="border-color:var(--bl);color:var(--bl2)">&#9654; Volledige beoordeling starten</button>'
    +'<button class="btn-print" onclick="window.print()">Afdrukken / PDF</button>'
    +'</div></div>'
    +'</div>';
}


document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
